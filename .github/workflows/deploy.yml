name: Build and deploy backend

# Runs on every push to main. workflow_dispatch also lets you
# trigger it by hand from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: exhacrgcpl9b1e.azurecr.io
  IMAGE: exhibition-api

jobs:
  build-and-push:
    name: Build image and push to ACR
    runs-on: ubuntu-latest

    steps:
      # 1. Get the source onto the runner (a fresh Ubuntu VM GitHub gives us).
      - name: Check out the code
        uses: actions/checkout@v4

      # 2. Buildx is Docker's better builder. We want it for the layer cache.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Authenticate to our private registry.
      #    The values come from GitHub repo secrets, never from this file.
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4. Build the Dockerfile and push two tags:
      #      :latest      -> what Azure watches; pushing it triggers the deploy
      #      :<git sha>   -> an immutable record of every build, for rollback
      #    cache-from/to reuse layers between runs so npm ci is not re-run
      #    unless package.json actually changed.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Nothing else to do. Azure has a webhook on this registry:
      #    a new :latest lands -> Azure pulls it and restarts the app.
      - name: Done
        run: echo "Pushed ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest - Azure will pull it via webhook."
